<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phillips · Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111111;
      --muted: #6b6b6b;
      --line: #e6e6e6;
      --accent: #111111;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    .wordmark {
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 14px;
    }

    .tag {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      gap: 16px;
    }

    h1 {
      font-weight: 300;
      font-size: clamp(32px, 6vw, 64px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    p.lede {
      max-width: 46ch;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    footer {
      padding: 20px 32px;
      border-top: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <!-- Figma node: TODO — link this prototype back to its source node -->
  <header>
    <span class="wordmark">Phillips</span>
    <span class="tag">Prototype</span>
  </header>

  <main>
    <h1>New prototype</h1>
    <p class="lede">
      A self-contained starting point. Build your single-file HTML / CSS / JS
      prototype here — it deploys to Vercel on every push.
    </p>
  </main>

  <footer>
    <span>Phillips</span>
    <span id="year"></span>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
